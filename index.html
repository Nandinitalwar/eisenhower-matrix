<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eisenhower Matrix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    header .date {
      font-size: 14px;
      color: #888;
      margin-top: 4px;
    }

    /* Timer overlay */
    #timer-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #timer-overlay.active { display: flex; }
    #timer-task-name {
      font-size: 20px;
      color: #fff;
      margin-bottom: 16px;
      text-align: center;
      max-width: 500px;
    }
    #timer-display {
      font-size: 96px;
      font-weight: 200;
      color: #fff;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    #timer-progress {
      width: 300px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-top: 24px;
      overflow: hidden;
    }
    #timer-progress-bar {
      height: 100%;
      background: #6c63ff;
      border-radius: 2px;
      transition: width 1s linear;
    }
    .timer-buttons {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }
    .timer-btn {
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .timer-btn:active { transform: scale(0.96); }
    .timer-btn.pause { background: #6c63ff; color: #fff; }
    .timer-btn.stop { background: #333; color: #ccc; }
    .timer-btn.done { background: #2ecc71; color: #fff; }

    /* Matrix grid */
    .matrix {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .axis-label-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      max-width: 1100px;
      margin: 0 auto 6px;
      text-align: center;
    }
    .axis-label-top span {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
    }

    .quadrant {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 16px;
      min-height: 260px;
      border: 2px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .quadrant.drag-over {
      border-color: #6c63ff;
      background: #1f1a2e;
    }
    .quadrant-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a2a;
    }
    .quadrant-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .quadrant-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .quadrant-header .subtitle {
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }

    /* Q1 - Urgent+Important (red) */
    .q1 .quadrant-dot { background: #e74c3c; }
    .q1 .quadrant-header h2 { color: #e74c3c; }

    /* Q2 - Not Urgent+Important (blue) */
    .q2 .quadrant-dot { background: #3498db; }
    .q2 .quadrant-header h2 { color: #3498db; }

    /* Q3 - Urgent+Not Important (orange) */
    .q3 .quadrant-dot { background: #f39c12; }
    .q3 .quadrant-header h2 { color: #f39c12; }

    /* Q4 - Not Urgent+Not Important (gray) */
    .q4 .quadrant-dot { background: #666; }
    .q4 .quadrant-header h2 { color: #888; }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .task {
      background: #242424;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      user-select: none;
    }
    .task:hover { background: #2a2a2a; transform: translateY(-1px); }
    .task.dragging { opacity: 0.4; }
    .task.completed .task-text { text-decoration: line-through; color: #555; }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #444;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .task-checkbox:hover { border-color: #6c63ff; }
    .task.completed .task-checkbox {
      background: #6c63ff;
      border-color: #6c63ff;
    }
    .task.completed .task-checkbox::after {
      content: '\2713';
      color: #fff;
      font-size: 11px;
    }

    .task-text {
      flex: 1;
      font-size: 14px;
      color: #ddd;
      line-height: 1.3;
    }
    .task-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .tag-work { background: #1a2a1a; color: #4ade80; }
    .tag-personal { background: #2a1a2a; color: #c084fc; }

    .task-timer-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .task-timer-btn:hover { border-color: #6c63ff; color: #6c63ff; }

    /* Add task input */
    .add-task-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .add-task-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      color: #ddd;
      font-size: 13px;
      outline: none;
    }
    .add-task-input:focus { border-color: #6c63ff; }
    .add-task-input::placeholder { color: #555; }
    .add-task-submit {
      background: #333;
      border: none;
      color: #aaa;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
    }
    .add-task-submit:hover { background: #6c63ff; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Eisenhower Matrix</h1>
    <div class="date" id="today-date"></div>
  </header>

  <div class="axis-label-top">
    <span>Urgent</span>
    <span>Not Urgent</span>
  </div>

  <div class="matrix">
    <div class="quadrant q1" id="q1" data-quadrant="q1">
      <div class="quadrant-header">
        <div class="quadrant-dot"></div>
        <h2>Do First</h2>
        <span class="subtitle">Urgent + Important</span>
      </div>
      <div class="task-list" id="list-q1"></div>
      <div class="add-task-row">
        <input class="add-task-input" placeholder="Add task..." data-quadrant="q1">
        <button class="add-task-submit" data-quadrant="q1">+</button>
      </div>
    </div>

    <div class="quadrant q2" id="q2" data-quadrant="q2">
      <div class="quadrant-header">
        <div class="quadrant-dot"></div>
        <h2>Schedule</h2>
        <span class="subtitle">Not Urgent + Important</span>
      </div>
      <div class="task-list" id="list-q2"></div>
      <div class="add-task-row">
        <input class="add-task-input" placeholder="Add task..." data-quadrant="q2">
        <button class="add-task-submit" data-quadrant="q2">+</button>
      </div>
    </div>

    <div class="quadrant q3" id="q3" data-quadrant="q3">
      <div class="quadrant-header">
        <div class="quadrant-dot"></div>
        <h2>Delegate</h2>
        <span class="subtitle">Urgent + Not Important</span>
      </div>
      <div class="task-list" id="list-q3"></div>
      <div class="add-task-row">
        <input class="add-task-input" placeholder="Add task..." data-quadrant="q3">
        <button class="add-task-submit" data-quadrant="q3">+</button>
      </div>
    </div>

    <div class="quadrant q4" id="q4" data-quadrant="q4">
      <div class="quadrant-header">
        <div class="quadrant-dot"></div>
        <h2>Eliminate</h2>
        <span class="subtitle">Not Urgent + Not Important</span>
      </div>
      <div class="task-list" id="list-q4"></div>
      <div class="add-task-row">
        <input class="add-task-input" placeholder="Add task..." data-quadrant="q4">
        <button class="add-task-submit" data-quadrant="q4">+</button>
      </div>
    </div>
  </div>

  <!-- Timer Overlay -->
  <div id="timer-overlay">
    <div id="timer-task-name"></div>
    <div id="timer-display">45:00</div>
    <div id="timer-progress"><div id="timer-progress-bar"></div></div>
    <div class="timer-buttons">
      <button class="timer-btn pause" id="timer-pause">Pause</button>
      <button class="timer-btn done" id="timer-done">Mark Done</button>
      <button class="timer-btn stop" id="timer-stop">Cancel</button>
    </div>
  </div>

  <script>
    // --- Data ---
    const STORAGE_KEY = 'eisenhower-matrix-tasks';

    const defaultTasks = [
      // Work -> q1 (urgent + important)
      { id: crypto.randomUUID(), text: 'Align on Alex diff', tag: 'work', quadrant: 'q1', completed: false },
      { id: crypto.randomUUID(), text: "Respond to Heikki's comment on API diff", tag: 'work', quadrant: 'q1', completed: false },
      { id: crypto.randomUUID(), text: 'Article on latency reduction (O-1)', tag: 'work', quadrant: 'q1', completed: false },
      { id: crypto.randomUUID(), text: 'Settings data movement reduction (latency)', tag: 'work', quadrant: 'q1', completed: false },
      // Non-work -> q4 (not urgent + not important) by default
      { id: crypto.randomUUID(), text: 'Cursor one-pager', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Cursor outreach', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'OpenAI one-pager', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'OpenAI outreach', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Write Nikunj article (Claude Code)', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Claude Code post', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Build RL environments', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Columbia in Tech event', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'File taxes', tag: 'personal', quadrant: 'q4', completed: false },
      { id: crypto.randomUUID(), text: 'Study web crawler', tag: 'personal', quadrant: 'q4', completed: false },
    ];

    let tasks = loadTasks();

    function loadTasks() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : defaultTasks;
    }
    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    // --- Date ---
    const dateEl = document.getElementById('today-date');
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // --- Render ---
    function render() {
      ['q1','q2','q3','q4'].forEach(q => {
        const list = document.getElementById('list-' + q);
        list.innerHTML = '';
        tasks.filter(t => t.quadrant === q).forEach(t => {
          const el = document.createElement('div');
          el.className = 'task' + (t.completed ? ' completed' : '');
          el.draggable = true;
          el.dataset.id = t.id;

          el.innerHTML = `
            <div class="task-checkbox" data-id="${t.id}"></div>
            <span class="task-text">${escapeHtml(t.text)}</span>
            <span class="task-tag tag-${t.tag}">${t.tag}</span>
            <button class="task-timer-btn" data-id="${t.id}">45m</button>
          `;

          // Drag events
          el.addEventListener('dragstart', e => {
            el.classList.add('dragging');
            e.dataTransfer.setData('text/plain', t.id);
            e.dataTransfer.effectAllowed = 'move';
          });
          el.addEventListener('dragend', () => el.classList.remove('dragging'));

          list.appendChild(el);
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Drag & Drop on quadrants ---
    document.querySelectorAll('.quadrant').forEach(quad => {
      quad.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        quad.classList.add('drag-over');
      });
      quad.addEventListener('dragleave', () => quad.classList.remove('drag-over'));
      quad.addEventListener('drop', e => {
        e.preventDefault();
        quad.classList.remove('drag-over');
        const taskId = e.dataTransfer.getData('text/plain');
        const task = tasks.find(t => t.id === taskId);
        if (task) {
          task.quadrant = quad.dataset.quadrant;
          saveTasks();
          render();
        }
      });
    });

    // --- Click handlers (checkbox + timer) ---
    document.addEventListener('click', e => {
      const checkbox = e.target.closest('.task-checkbox');
      if (checkbox) {
        const task = tasks.find(t => t.id === checkbox.dataset.id);
        if (task) {
          task.completed = !task.completed;
          saveTasks();
          render();
        }
        return;
      }
      const timerBtn = e.target.closest('.task-timer-btn');
      if (timerBtn) {
        const task = tasks.find(t => t.id === timerBtn.dataset.id);
        if (task) startTimer(task);
      }
    });

    // --- Add task ---
    document.querySelectorAll('.add-task-submit').forEach(btn => {
      btn.addEventListener('click', () => {
        const q = btn.dataset.quadrant;
        const input = btn.previousElementSibling;
        const text = input.value.trim();
        if (!text) return;
        tasks.push({
          id: crypto.randomUUID(),
          text,
          tag: 'personal',
          quadrant: q,
          completed: false
        });
        input.value = '';
        saveTasks();
        render();
      });
    });
    document.querySelectorAll('.add-task-input').forEach(input => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          input.nextElementSibling.click();
        }
      });
    });

    // --- Timer ---
    const TIMER_DURATION = 45 * 60; // 45 min in seconds
    let timerInterval = null;
    let timerRemaining = 0;
    let timerPaused = false;
    let timerTaskId = null;

    const overlay = document.getElementById('timer-overlay');
    const timerDisplay = document.getElementById('timer-display');
    const timerTaskName = document.getElementById('timer-task-name');
    const timerProgressBar = document.getElementById('timer-progress-bar');
    const pauseBtn = document.getElementById('timer-pause');
    const stopBtn = document.getElementById('timer-stop');
    const doneBtn = document.getElementById('timer-done');

    function startTimer(task) {
      timerTaskId = task.id;
      timerRemaining = TIMER_DURATION;
      timerPaused = false;
      timerTaskName.textContent = task.text;
      pauseBtn.textContent = 'Pause';
      updateTimerDisplay();
      overlay.classList.add('active');

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!timerPaused) {
          timerRemaining--;
          updateTimerDisplay();
          if (timerRemaining <= 0) {
            clearInterval(timerInterval);
            timerDisplay.textContent = "Time's up!";
            timerProgressBar.style.width = '100%';
            timerProgressBar.style.background = '#2ecc71';
          }
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = Math.floor(timerRemaining / 60);
      const s = timerRemaining % 60;
      timerDisplay.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const pct = ((TIMER_DURATION - timerRemaining) / TIMER_DURATION) * 100;
      timerProgressBar.style.width = pct + '%';
      timerProgressBar.style.background = '#6c63ff';
    }

    pauseBtn.addEventListener('click', () => {
      timerPaused = !timerPaused;
      pauseBtn.textContent = timerPaused ? 'Resume' : 'Pause';
    });

    stopBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      overlay.classList.remove('active');
    });

    doneBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      overlay.classList.remove('active');
      const task = tasks.find(t => t.id === timerTaskId);
      if (task) {
        task.completed = true;
        saveTasks();
        render();
      }
    });

    // --- Init ---
    render();
  </script>
</body>
</html>
